<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">

  <!-- Open Graph -->
  <meta property="og:title" content="CogniRoute | Bilişsel Navigasyon">

  <meta property="og:image" content="https://cogniroute.de/og-image.jpg">
  <meta property="og:url" content="https://cogniroute.de">
  <meta property="og:type" content="website">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CogniRoute | Bilişsel Navigasyon">
  <meta name="twitter:description" content="Zihnin Rotası, Güvenin Limanı.">
  <meta name="twitter:image" content="https://cogniroute.de/og-image.jpg">
  <link rel="icon" href="https://cogniroute.de/favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0D0B1E;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      color: #F5F0E8;
      line-height: 1.5;
      padding: 20px;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      background-color: #0D0B1E;
      border-radius: 48px;
      overflow: hidden;
    }
    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      padding: 24px 24px 12px 24px;
      border-bottom: 1px solid rgba(155,111,212,0.25);
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo span {
      color: #9B6FD4;
    }
    .badge {
      font-size: 0.75rem;
      background: rgba(155,111,212,0.15);
      padding: 6px 12px;
      border-radius: 60px;
      color: #9B6FD4;
      font-weight: 500;
    }
    .lang-buttons {
      display: flex;
      gap: 8px;
    }
    .lang-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(155,111,212,0.4);
      border-radius: 60px;
      padding: 6px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      color: #F5F0E8;
    }
    .lang-btn.active {
      background: #9B6FD4;
      color: #0D0B1E;
      border-color: #9B6FD4;
    }
    /* Hero */
    .hero {
      padding: 40px 24px 24px 24px;
      text-align: center;
    }
    .hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
      color: #F5F0E8;
    }
    .hero h1 span {
      color: #9B6FD4;
    }
    .hero-tagline {
      font-family: system-ui;
      font-size: 1.2rem;
      font-weight: 400;
      color: #F6B45F;
      margin-bottom: 8px;
    }
    /* Feature Grid */
    .features-section {
      padding: 20px 24px;
    }
    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #F6B45F;
      border-left: 4px solid #9B6FD4;
      padding-left: 14px;
    }
    .features-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .feature-card {
      background: rgba(155,111,212,0.06);
      border-radius: 28px;
      padding: 20px;
      border: 1px solid rgba(155,111,212,0.2);
      transition: 0.2s;
    }
    .feature-emoji {
      font-size: 2rem;
      margin-bottom: 12px;
    }
    .feature-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #9B6FD4;
      margin-bottom: 8px;
    }
    .feature-desc {
      font-size: 0.9rem;
      color: #E0DCE8;
      line-height: 1.5;
    }
    /* Statistics */
    .stats-section {
      background: rgba(155,111,212,0.08);
      margin: 20px 24px;
      padding: 24px 20px;
      border-radius: 32px;
      text-align: center;
    }
    .stats-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin-top: 16px;
    }
    .stat-card {
      background: rgba(0,0,0,0.3);
      border-radius: 24px;
      padding: 16px 12px;
      text-align: center;
      flex: 1;
      min-width: 110px;
      border: 1px solid rgba(155,111,212,0.3);
    }
    .stat-number {
      font-size: 1.6rem;
      font-weight: 800;
      color: #9B6FD4;
    }
    .stat-label {
      font-size: 0.75rem;
      color: #C0B8D8;
      margin-top: 6px;
    }
    /* Cross-links */
    .crosslinks-section {
      padding: 20px 24px;
    }
    .cross-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .cross-card {
      background: rgba(246,180,95,0.08);
      border-radius: 24px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      transition: 0.2s;
      border: 1px solid rgba(246,180,95,0.2);
    }
    .cross-card:hover {
      background: rgba(246,180,95,0.15);
      transform: translateX(6px);
    }
    .cross-emoji {
      font-size: 2rem;
    }
    .cross-text {
      flex: 1;
    }
    .cross-title {
      font-weight: 700;
      color: #F6B45F;
    }
    .cross-desc {
      font-size: 0.8rem;
      color: #E0DCE8;
    }
    /* Beta Form */
    .beta-section {
      background: rgba(155,111,212,0.12);
      margin: 20px 24px 32px 24px;
      padding: 28px 24px;
      border-radius: 32px;
      text-align: center;
    }
    .beta-section h3 {
      font-size: 1.4rem;
      margin-bottom: 8px;
      font-weight: 700;
      color: #F5F0E8;
    }
    .beta-section p {
      font-size: 0.9rem;
      color: #C0B8D8;
      margin-bottom: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 400px;
      margin: 0 auto;
    }
    .form-group input {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(155,111,212,0.6);
      border-radius: 60px;
      padding: 14px 20px;
      font-size: 1rem;
      color: #F5F0E8;
      outline: none;
    }
    .form-group input:focus {
      border-color: #9B6FD4;
      background: rgba(255,255,255,0.15);
    }
    .form-group input::placeholder {
      color: #9A92B0;
    }
    .btn-primary {
      background: #9B6FD4;
      border: none;
      border-radius: 60px;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 700;
      color: #0D0B1E;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
    }
    .btn-primary:hover {
      background: #b38be0;
      transform: scale(0.98);
    }
    /* Footer */
    .footer {
      padding: 28px 24px 32px 24px;
      text-align: center;
      border-top: 1px solid rgba(155,111,212,0.2);
      font-size: 0.7rem;
      color: #9A92B0;
    }
    .footer a {
      color: #9B6FD4;
      text-decoration: none;
      margin: 0 6px;
    }
    .footer a:hover {
      color: #F6B45F;
    }
    .footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 12px 0 8px;
    }
    @media (min-width: 560px) {
      .hero h1 { font-size: 2.8rem; }
      .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .stats-grid { flex-wrap: nowrap; }
    }
  </style>
</head>

  en: {

    errorMsg: "Please enter your name and email address."

var currentLang = "tr";

function detectLanguage() {
  var userLang = navigator.language || navigator.userLanguage;
  if (userLang.indexOf("tr") === 0) return "tr";
  if (userLang.indexOf("de") === 0) return "de";
  return "en";
}

function renderContent(lang) {
  var t = texts[lang];
  if (!t) return;
  
  // Features HTML
  var featuresHtml = '';
  for (var i = 0; i < t.features.length; i++) {
    var f = t.features[i];
    featuresHtml += '<div class="feature-card">' +
      '<div class="feature-emoji">' + f.emoji + '</div>' +
      '<div class="feature-title">' + f.title + '</div>' +
      '<div class="feature-desc">' + f.desc + '</div>' +
      '</div>';
  }
  
  // Statistics HTML
  var statsHtml = '<div class="stats-grid">';
  for (var j = 0; j < t.stats.length; j++) {
    var s = t.stats[j];
    statsHtml += '<div class="stat-card">' +
      '<div class="stat-number">' + s.number + '</div>' +
      '<div class="stat-label">' + s.label + '</div>' +
      '</div>';
  }
  statsHtml += '</div>';
  
  // Cross-links HTML
  var crossHtml = '';
  for (var k = 0; k < t.crossLinks.length; k++) {
    var c = t.crossLinks[k];
    crossHtml += '<a href="' + c.url + '" target="_blank" rel="noopener" class="cross-card">' +
      '<div class="cross-emoji">' + c.emoji + '</div>' +
      '<div class="cross-text">' +
      '<div class="cross-title">' + c.title + '</div>' +
      '<div class="cross-desc">' + c.desc + '</div>' +
      '</div>' +
      '</a>';
  }
  
  // Beta form
  var betaHtml = '<div class="beta-section">' +
    '<h3>📧 ' + t.betaTitle + '</h3>' +
    '<p>' + t.betaDesc + '</p>' +
    '<form id="betaForm" onsubmit="return submitBeta(event)">' +
    '<div class="form-group">' +
    '<input type="text" id="name" name="name" placeholder="' + t.namePlaceholder + '" required>' +
    '<input type="email" id="email" name="email" placeholder="' + t.emailPlaceholder + '" required>' +
    '<button type="submit" class="btn-primary">' + t.buttonText + '</button>' +
    '</div>' +
    '</form>' +
    '</div>';
  
  var fullHtml = 
    '<div class="hero">' +
      '<h1>Cogni<span>Route</span></h1>' +
      '<div class="hero-tagline">' + t.tagline + '</div>' +
    '</div>' +
    '<div class="features-section">' +
      '<div class="section-title">' + t.featuresTitle + '</div>' +
      '<div class="features-grid">' + featuresHtml + '</div>' +
    '</div>' +
    '<div class="stats-section">' +
      '<div class="section-title" style="font-size:1.2rem;">📊 ' + t.statsTitle + '</div>' +
      statsHtml +
    '</div>' +
    '<div class="crosslinks-section">' +
      '<div class="section-title">🔗 ' + t.crossTitle + '</div>' +
      '<div class="cross-grid">' + crossHtml + '</div>' +
    '</div>' +
    betaHtml;
  
  document.getElementById("dynamicContent").innerHTML = fullHtml;
  
  // Highlight active language button
  var btns = document.querySelectorAll('.lang-btn');
  for (var i = 0; i < btns.length; i++) {
    if (btns[i].getAttribute('data-lang') === lang) {
      btns[i].classList.add('active');
    } else {
      btns[i].classList.remove('active');
    }
  }
}

function setLanguage(lang) {
  currentLang = lang;
  renderContent(lang);
}

function submitBeta(event) {
  event.preventDefault();
  var nameInput = document.getElementById('name');
  var emailInput = document.getElementById('email');
  var t = texts[currentLang];
  if (nameInput && emailInput && nameInput.value.trim() !== '' && emailInput.value.trim() !== '') {
    alert(t.successMsg);
    nameInput.value = '';
    emailInput.value = '';
  } else {
    alert(t.errorMsg);
  }
  return false;
}

// Initialize
var initialLang = detectLanguage();
currentLang = initialLang;
renderContent(initialLang);

// Attach language button events
var langBtns = document.querySelectorAll('.lang-btn');
for (var i = 0; i < langBtns.length; i++) {
  langBtns[i].addEventListener('click', function(e) {
    var lang = this.getAttribute('data-lang');
    setLanguage(lang);
  });
}
</script>
</body>
</html>
